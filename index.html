          <div className="flex items-baseline gap-2">
            <span className="text-2xl font-bold text-gray-900">{r.pct}%</span>
            <span className={"text-xs font-semibold "+(r.pct>=100?"text-emerald-600":"text-red-500")}>

              <span className="text-xs text-gray-400">{s.pages}p</span>
            </div>
            <div className="px-3 py-2 text-xs text-gray-600 leading-relaxed whitespace-pre-line">{s.preview}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CompetitionResult({summary,findings}){
  return (
    <div>
      <div className="p-3 bg-violet-50 border border-violet-200 rounded-lg mb-4 text-sm text-violet-800 font-medium">{summary}</div>
      <ul className="space-y-2">
        {findings.map((f,i)=>(
          <li key={i} className="flex gap-2 text-sm text-gray-700">
            <span className="text-violet-400 flex-shrink-0 mt-0.5">▪</span>{f}
          </li>
        ))}
      </ul>
    </div>
  );
}

function PapersResult({classification,topPapers}){
  const cls={실험:"bg-emerald-50 text-emerald-700",시뮬레이션:"bg-sky-50 text-sky-700",리뷰:"bg-amber-50 text-amber-700",이론:"bg-gray-100 text-gray-600"};
  return (
    <div>
      <div className="grid grid-cols-4 gap-2 mb-5">
        {Object.entries(classification).map(([k,v])=>(
          <div key={k} className={"rounded-xl p-3 text-center "+cls[k]}>
            <div className="text-xl font-bold">{v}</div>
            <div className="text-xs mt-0.5">{k}</div>
          </div>
        ))}
      </div>
      <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">인용수 TOP 논문</div>
      <div className="space-y-2">
        {topPapers.map((p,i)=>(
          <div key={i} className="flex gap-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
            <span className="text-xs font-bold text-gray-300 mt-0.5 w-4 flex-shrink-0">{i+1}</span>
            <div>
              <div className="text-sm text-gray-800 font-medium leading-snug">{p.title}</div>
              <div className="mt-1 text-xs text-gray-400">{p.journal} · {p.year} · <span className="text-emerald-600 font-semibold">인용 {p.citations}</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PatentsResult({trend,topApplicants,color}){
  return (
    <div>
      <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">연도별 출원 추이</div>
      <div style={{height:160}} className="mb-5">
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={trend} margin={{top:4,right:4,bottom:4,left:-20}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
            <XAxis dataKey="year" tick={{fontSize:11}}/>
            <YAxis tick={{fontSize:11}}/>
            <Tooltip/>
            <Bar dataKey="count" fill={color} radius={[4,4,0,0]} name="출원건수"/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">출원인 TOP 5</div>
      <div className="space-y-2">
        {topApplicants.map((a,i)=>(
          <div key={i} className="flex items-center gap-2">
            <span className="text-xs text-gray-300 w-4 flex-shrink-0">{i+1}</span>
            <span className="text-sm text-gray-700 w-28 flex-shrink-0">{a.name}</span>
            <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full" style={{width:`${(a.count/45)*100}%`,backgroundColor:color}}/>
            </div>
            <span className="text-xs text-gray-400 w-8 text-right flex-shrink-0">{a.count}건</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SpectralResult({samples}){
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm border-collapse">
        <thead>
          <tr className="bg-gray-50">
            {["샘플","피크 파장","강도","FWHM","판정"].map(h=>(
              <th key={h} className="px-3 py-2 text-left font-semibold text-gray-600 border-b border-gray-200 whitespace-nowrap text-xs">{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {samples.map((s,i)=>(
            <tr key={i} className={"border-b border-gray-100 "+(!s.ok?"bg-red-50":"hover:bg-gray-50")}>
              <td className={"px-3 py-2.5 font-semibold "+(!s.ok?"text-red-700":"text-gray-900")}>{s.name}</td>
              <td className="px-3 py-2.5 jb text-xs text-gray-700">{s.peak}</td>
              <td className={"px-3 py-2.5 jb text-xs "+(!s.ok?"text-red-600 font-bold":"text-gray-700")}>{s.intensity}</td>
              <td className={"px-3 py-2.5 jb text-xs "+(!s.ok?"text-red-600 font-bold":"text-gray-700")}>{s.fwhm}</td>
              <td className="px-3 py-2.5">
                <span className={"text-xs font-medium px-2 py-0.5 rounded-full "+(!s.ok?"bg-red-100 text-red-700":"bg-emerald-100 text-emerald-700")}>
                  {s.ok?"✅ 양호":"⚠️ 재측정 필요"}
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function EquipmentResult({items}){
  return (
    <div className="space-y-3">
      {items.map((item,i)=>(
        <div key={i} className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
          <div className="flex justify-between items-start mb-2">
            <div>
              <div className="text-sm font-semibold text-gray-900">{item.name}</div>
              <div className="text-xs text-gray-400 mt-0.5">주 이용팀: {item.top}</div>
            </div>
            <span className={"text-sm font-bold "+(item.pct>=100?"text-emerald-600":item.pct>=75?"text-amber-600":"text-red-500")}>
              {item.pct}%
            </span>
          </div>
          <div className="h-2 bg-gray-100 rounded-full overflow-hidden mb-1">
            <div className={"h-full rounded-full "+(item.pct>=100?"bg-emerald-400":item.pct>=75?"bg-amber-400":"bg-red-400")} style={{width:`${Math.min(item.pct,100)}%`}}/>
          </div>
          <div className="text-xs text-gray-400">{item.hours}h / 목표 {item.target}h</div>
        </div>
      ))}
    </div>
  );
}

function LetterResult({to,subject,preview,filename}){
  return (
    <div>
      <div className="flex items-center gap-2 mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">
        <IcoFile color="#B45309"/>
        <span className="text-sm font-medium text-amber-800">{filename}</span>
        <span className="ml-auto text-xs bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full">생성 완료</span>
      </div>
      <div className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
        <div className="bg-gray-50 px-4 py-3 border-b border-gray-200 space-y-2">
          <div><div className="text-xs text-gray-400">수신</div><div className="text-sm font-medium text-gray-800">{to}</div></div>
          <div><div className="text-xs text-gray-400">제목</div><div className="text-sm font-medium text-gray-800">{subject}</div></div>
        </div>
        <div className="px-4 py-3">
          <div className="text-sm text-gray-700 leading-relaxed whitespace-pre-line">{preview}</div>
          <div className="mt-2 text-xs text-gray-400">…전문 보기</div>
        </div>
      </div>
    </div>
  );
}

function ContentResult({outputs}){
  const pal=["bg-sky-50 border-sky-200","bg-pink-50 border-pink-200","bg-violet-50 border-violet-200","bg-emerald-50 border-emerald-200"];
  return (
    <div className="space-y-3">
      {outputs.map((o,i)=>(
        <div key={i} className={"border rounded-xl p-4 "+pal[i%pal.length]}>
          <div className="text-xs font-semibold text-gray-500 mb-1.5">{o.format}</div>
          <div className="text-sm text-gray-800 leading-relaxed">{o.preview}</div>
        </div>
      ))}
    </div>
  );
}

function ResultDispatch({taskId,color}){
  const r=RESULTS[taskId];
  if(!r) return null;
  switch(taskId){
    case "announcements": return <AnnouncementsResult rows={r.rows}/>;
    case "kpis":          return <KpiResult rows={r.rows}/>;
    case "proposal":      return <ProposalResult filename={r.filename} sections={r.sections}/>;
    case "competition":   return <CompetitionResult summary={r.summary} findings={r.findings}/>;
    case "papers":        return <PapersResult classification={r.classification} topPapers={r.topPapers}/>;
    case "patents":       return <PatentsResult trend={r.trend} topApplicants={r.topApplicants} color={color}/>;
    case "spectral":      return <SpectralResult samples={r.samples}/>;
    case "equipment":     return <EquipmentResult items={r.items}/>;
    case "letter":        return <LetterResult to={r.to} subject={r.subject} preview={r.preview} filename={r.filename}/>;
    case "content":       return <ContentResult outputs={r.outputs}/>;
    default: return null;
  }
}

/* ══════════════════════════════════════════════════
   터미널
══════════════════════════════════════════════════ */
function Terminal({prompt,phase}){
  const [displayed,setDisplayed]=useState("");
  const timer=useRef(null);
  useEffect(()=>{
    setDisplayed(""); let i=0;
    timer.current=setInterval(()=>{ i++; setDisplayed(prompt.slice(0,i)); if(i>=prompt.length) clearInterval(timer.current); },16);
    return ()=>clearInterval(timer.current);
  },[prompt]);
  return (
    <div className="rounded-xl overflow-hidden jb">
      <div className="flex items-center gap-1.5 px-4 py-2.5 bg-gray-800 border-b border-gray-700">
        <span className="w-3 h-3 rounded-full bg-red-500"/>
        <span className="w-3 h-3 rounded-full bg-yellow-500"/>
        <span className="w-3 h-3 rounded-full bg-green-500"/>
        <span className="ml-2 text-xs text-gray-400">터미널</span>
      </div>
      <div className="bg-gray-900 p-4 min-h-[90px]">
        <span className="text-emerald-400 text-sm">$ </span>
        <span className="text-gray-100 text-sm whitespace-pre-wrap">{displayed}</span>
        {phase==="typing" && <span className="inline-block w-2 h-[14px] bg-gray-300 ml-0.5 align-middle blink-cur"/>}
        {phase!=="typing" && (
          <div className="mt-3 text-sm flex items-center gap-2">
            {phase==="loading"
              ? <><IcoLoader/><span className="text-yellow-400">실행 중...</span></>
              : <><IcoCheck size={14} color="#34D399"/><span className="text-emerald-400">완료</span></>
            }
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   실행 화면
══════════════════════════════════════════════════ */
function ExecutionView({agent,task,onBack}){
  const [phase,setPhase]=useState("typing");
  const [showResult,setShowResult]=useState(false);
  const r=RESULTS[task.id];
  useEffect(()=>{
    const ms=task.prompt.length*16+500;
    const t1=setTimeout(()=>setPhase("loading"),ms);
    const t2=setTimeout(()=>{ setPhase("done"); setShowResult(true); },ms+1600);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[task]);
  return (
    <div className="min-h-screen bg-gray-50">
      <div className="sticky top-0 z-10 bg-white border-b border-gray-200 px-4 py-3">
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 transition-colors">
          <IcoArrow/> 팀으로 돌아가기
        </button>
      </div>
      <div className="max-w-2xl mx-auto px-4 py-7 space-y-5">
        <div className="flex items-center gap-4">
          <div className="relative flex-shrink-0">
            <img src={`https://api.dicebear.com/7.x/lorelei/svg?seed=${agent.seed}&backgroundColor=${agent.color.replace("#","")}&backgroundType=solid`}
              alt={agent.name} className="w-14 h-14 rounded-full border-2" style={{borderColor:agent.color}}/>
            <span className="absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full bg-emerald-500 border-2 border-white pulse-dot"/>
          </div>
          <div>
            <div className="text-lg font-bold text-gray-900">{agent.name}</div>
            <div className="text-xs text-gray-400">{agent.dept} · {agent.rank}</div>
            <div className="text-sm font-semibold mt-0.5" style={{color:agent.color}}>{task.label} 실행 중...</div>
          </div>
        </div>
        <Terminal prompt={task.prompt} phase={phase}/>
        {showResult && r && (
          <div className="fade-in">
            <div className="flex items-center gap-2 mb-3">
              <IcoCheck size={17} color="#10B981"/>
              <span className="font-bold text-gray-900">{r.title}</span>
            </div>
            <div className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
              <ResultDispatch taskId={task.id} color={agent.color}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   에이전트 카드
══════════════════════════════════════════════════ */
function TaskBtn({task,agent,onSelectTask}){
  const [hov,setHov]=useState(false);
  return (
    <button
      onClick={()=>onSelectTask(agent,task)}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      className="w-full text-left text-sm px-3 py-2.5 rounded-xl border font-medium transition-all duration-150"
      style={{backgroundColor:hov?agent.color:"transparent",borderColor:hov?agent.color:"#E5E7EB",color:hov?"white":"#374151"}}
    >
      ▶ {task.label}
    </button>
  );
}

function AgentCard({agent,onSelectTask}){
  return (
    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col card-hover">
      <div className="h-1.5 flex-shrink-0" style={{backgroundColor:agent.color}}/>
      <div className="p-5 flex flex-col flex-1">
        <div className="flex items-center gap-3 mb-3">
          <div className="relative flex-shrink-0">
            <img src={`https://api.dicebear.com/7.x/lorelei/svg?seed=${agent.seed}&backgroundColor=${agent.color.replace("#","")}&backgroundType=solid`}
              alt={agent.name} className="w-16 h-16 rounded-full border-2" style={{borderColor:agent.color}}/>
            <span className="absolute bottom-0.5 right-0.5 w-3.5 h-3.5 rounded-full border-2 border-white bg-emerald-500 pulse-dot"/>
          </div>
          <div>
            <div className="text-base font-bold text-gray-900">{agent.name}</div>
            <div className="text-xs text-gray-400">{agent.rank}</div>
            <span className="inline-block mt-1 text-xs font-medium px-2 py-0.5 rounded-full"
              style={{backgroundColor:agent.bgLight,color:agent.color}}>{agent.dept}</span>
          </div>
        </div>
        <p className="text-xs text-gray-400 italic mb-4">"{agent.status}"</p>
        <div className="mt-auto space-y-2">
          {agent.tasks.map(t=><TaskBtn key={t.id} task={t} agent={agent} onSelectTask={onSelectTask}/>)}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   메인
══════════════════════════════════════════════════ */
function App(){
  const [sel,setSel]=useState(null);
  if(sel) return <ExecutionView agent={sel.agent} task={sel.task} onBack={()=>setSel(null)}/>;
  const row1=AGENTS.slice(0,3), row2=AGENTS.slice(3,5);
  const pick=(a,t)=>setSel({agent:a,task:t});
  return (
    <div className="min-h-screen bg-gray-50">
      <header className="bg-white border-b border-gray-200 px-6 py-5">
        <div className="max-w-5xl mx-auto flex items-start justify-between">
          <div>
            <h1 className="text-2xl font-extrabold text-gray-900 tracking-tight">KOPTI AI Agent Team</h1>
            <p className="text-sm text-gray-400 mt-0.5">한국광기술원 AI 에이전트 팀</p>
          </div>
          <div className="text-right hidden sm:block">
            <div className="text-xs text-gray-400">업무 지시는 자연어로, 실행은 AI가</div>
            <div className="flex items-center gap-1.5 mt-1 justify-end">
              <span className="w-2 h-2 rounded-full bg-emerald-500 pulse-dot"/>
              <span className="text-xs text-emerald-600 font-semibold">5명 온라인</span>
            </div>
          </div>
        </div>
      </header>
      <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-5">
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          {row1.map(a=><AgentCard key={a.id} agent={a} onSelectTask={pick}/>)}
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 lg:w-2/3 lg:mx-auto">
          {row2.map(a=><AgentCard key={a.id} agent={a} onSelectTask={pick}/>)}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
